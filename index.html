<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مایار بوت - Mayar Bot</title>
    <style>
        body { font-family: Tahoma, sans-serif; background-color: #121212; color: #ffffff; padding: 20px; text-align: center; }
        .chat-container { max-width: 500px; margin: auto; background: #1e1e1e; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid #bb86fc; }
        h2 { color: #bb86fc; font-size: 24px; margin-bottom: 5px; }
        input { width: 85%; padding: 12px; border: 1px solid #333; border-radius: 8px; background: #2d2d2d; color: #fff; text-align: right; font-size: 16px; }
        input:focus { border-color: #bb86fc; outline: none; }
        button { margin-top: 15px; padding: 12px 25px; background: #bb86fc; color: #121212; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; width: 90%; }
        button:hover { background: #9a66d4; }
        #response { margin-top: 25px; padding: 15px; background: #2d2d2d; border-radius: 8px; text-align: right; line-height: 1.6; border-right: 4px solid #bb86fc; min-height: 50px; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="chat-container">
    <h2>🤖 مایار بوت (Mayar Bot)</h2>
    <p style="color: #aaa; font-size: 14px; margin-top: 0;">پاسخ‌گوی هوشمند شما</p>
    <input type="text" id="userInput" placeholder="سوال خود را از مایار بوت بپرسید...">
    <button onclick="askMayarBot()">ارسال سوال</button>
    <div id="response">منتظر سوال شما هستم...</div>
</div>

<script>
async function askMayarBot() {
    const question = document.getElementById('userInput').value;
    const responseDiv = document.getElementById('response');
    
    if (!question.trim()) {
        responseDiv.innerText = "لطفاً ابتدا یک سوال بنویسید!";
        return;
    }

    responseDiv.innerText = "مایار بوت در حال فکر کردن است...";

    // استفاده از یک سرور رایگان و بدون نیاز به کلید API
    const url = `https://pollinations.ai{encodeURIComponent(question)}`;

    try {
        const response = await fetch(url);
        const aiText = await response.text();
        
        // شرط شما: همیشه اول پاسخ این جمله چاپ می‌شود
        const intro = "به اجازه عبدالوهاب مایار؛\n\n";
        
        responseDiv.innerText = intro + aiText;

    } catch (error) {
        responseDiv.innerText = "خطا در ارتباط با سرور! لطفاً مطمئن شوید اینترنت یا فیلترشکن شما وصل است.";
        console.error(error);
    }
}
</script>

</body>
</html>
